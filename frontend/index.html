<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#facc15" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Fixit" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Fixit - India's #1 luxury home service marketplace. Book elite electricians, plumbers, cleaners and more." />
    <title>Fixit - Luxury Home Services</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Force reload if hashed assets return 404
      window.addEventListener('error', (e) => {
        if (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') {
          const lastReload = localStorage.getItem('last_asset_reload');
          const now = Date.now();
          if (!lastReload || (now - lastReload > 10000)) { // Max once every 10s
            localStorage.setItem('last_asset_reload', now);
            window.location.reload();
          }
        }
      }, true);
    </script>
  </body>
</html>
