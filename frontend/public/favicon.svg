<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#facc15;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feFlood flood-color="rgba(0,0,0,0.5)" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded Square Background -->
  <rect width="512" height="512" rx="120" fill="#0a0a0a" />
  <!-- Stylized F -->
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" 
        style="font-family: 'Outfit', 'Inter', sans-serif; font-weight: 900; font-size: 380px; fill: url(#goldGrad); filter: url(#shadow);">
    F
  </text>
  <!-- Accent Line -->
  <rect x="130" y="400" width="250" height="15" rx="7.5" fill="#facc15" opacity="0.3" />
</svg>